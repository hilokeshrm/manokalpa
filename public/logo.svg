<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Lotus / Mind symbol -->
  <g transform="translate(8, 8)">
    <!-- Outer petals -->
    <path d="M22 36 C22 36 14 28 14 20 C14 14 18 10 22 10 C26 10 30 14 30 20 C30 28 22 36 22 36Z" fill="#5C45D5" opacity="0.15"/>
    <path d="M22 36 C22 36 8 30 6 22 C4 16 8 10 13 10 C17 10 20 14 22 20 C20 28 22 36 22 36Z" fill="#5C45D5" opacity="0.25"/>
    <path d="M22 36 C22 36 36 30 38 22 C40 16 36 10 31 10 C27 10 24 14 22 20 C24 28 22 36 22 36Z" fill="#5C45D5" opacity="0.25"/>
    <!-- Inner petals -->
    <path d="M22 34 C22 34 16 28 16 22 C16 17 18.5 14 22 14 C25.5 14 28 17 28 22 C28 28 22 34 22 34Z" fill="#5C45D5" opacity="0.5"/>
    <!-- Center -->
    <circle cx="22" cy="22" r="5" fill="#5C45D5"/>
    <!-- Calm wave underneath -->
    <path d="M8 40 Q14 37 22 40 Q30 43 36 40" stroke="#2ECC9A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M4 44 Q14 41 22 44 Q30 47 40 44" stroke="#2ECC9A" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="58" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="22" fill="#1A1F36" letter-spacing="-0.5">mano</text>
  <text x="107" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="22" fill="#5C45D5" letter-spacing="-0.5">kalpa</text>
  <!-- Tagline -->
  <text x="58" y="50" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280" letter-spacing="1.5">INTEGRATED WELLNESS</text>
</svg>
